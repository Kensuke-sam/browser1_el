<!doctype html>
<html lang="ja" data-theme="liquid" data-variant="liquid">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' 'unsafe-inline' data:; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: http:;"
    />
    <script>
      (() => {
        try {
          const stored = localStorage.getItem("zen-settings");
          if (!stored) {
            // Default to liquid if nothing stored
            document.documentElement.dataset.theme = "liquid";
            document.documentElement.dataset.variant = "liquid";
            return;
          }
          const parsed = JSON.parse(stored);
          const theme = parsed?.theme;
          if (theme === "classic" || theme === "liquid") {
            document.documentElement.dataset.theme = theme;
          }
        } catch {}
      })();
    </script>
    <title>Zen Browser</title>
    <link rel="stylesheet" href="../styles/main.css" />
    <link rel="stylesheet" href="../styles/sidebar.css" />
    <link rel="stylesheet" href="../styles/toolbar.css" />
    <link rel="stylesheet" href="../styles/webview.css" />
    <link rel="stylesheet" href="../styles/panels.css" />
  </head>
  <body>
    <div class="browser-container">
      <!-- サイドバー (垂直タブ) -->
      <aside class="sidebar" id="sidebar">
        <!-- Spaces セレクター -->
        <div class="spaces-container">
          <div class="spaces-list" id="spaces-list"></div>
          <button
            class="add-space-btn"
            id="add-space-btn"
            title="スペースを追加"
          >
            <span>+</span>
          </button>
        </div>

        <!-- タブリスト -->
        <div class="tabs-container" id="tabs-container">
          <div class="tabs-list" id="tabs-list">
            <!-- タブがここに動的に追加される -->
          </div>
          <div class="tabs-section tabs-section--other" id="other-tabs-section">
            <div class="tabs-section-header">他のタブ</div>
            <div class="tabs-list" id="other-tabs-list"></div>
          </div>
        </div>

        <!-- 新規タブボタン -->
        <button class="new-tab-btn" id="new-tab-btn" title="新規タブ (Ctrl+T)">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
            <path
              d="M8 2v12M2 8h12"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            />
          </svg>
          <span>新規タブ</span>
        </button>

        <!-- サイドバー下部のコントロール -->
        <div class="sidebar-controls">
          <button class="sidebar-btn" id="settings-btn" title="設定">
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="12" cy="12" r="3" />
              <path
                d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
              />
            </svg>
          </button>
          <button
            class="sidebar-btn compact-toggle"
            id="compact-toggle"
            title="コンパクトモード"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path d="M11 19l-7-7 7-7M17 19l-7-7 7-7" />
            </svg>
          </button>
        </div>
        <div
          class="sidebar-resize-handle"
          id="sidebar-resize-handle"
          aria-hidden="true"
        ></div>
      </aside>

      <!-- メインコンテンツエリア -->
      <main class="main-content">
        <!-- ツールバー -->
        <div class="toolbar" id="toolbar">
          <!-- ドラッグエリア -->
          <div class="window-controls-drag-area"></div>

          <!-- ナビゲーションボタン -->
          <div class="nav-buttons">
            <button
              class="nav-btn"
              id="sidebar-toggle"
              title="サイドバーを収納"
              aria-label="サイドバーを収納"
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="4" width="18" height="16" rx="2" />
                <line x1="9" y1="4" x2="9" y2="20" />
                <polyline points="14 8 10 12 14 16" />
              </svg>
            </button>
            <button class="nav-btn" id="back-btn" title="戻る (Alt+←)" disabled>
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="currentColor"
              >
                <path
                  d="M11 2L5 8l6 6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </button>
            <button
              class="nav-btn"
              id="forward-btn"
              title="進む (Alt+→)"
              disabled
            >
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="currentColor"
              >
                <path
                  d="M5 2l6 6-6 6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  fill="none"
                />
              </svg>
            </button>
            <button class="nav-btn" id="reload-btn" title="再読み込み (Ctrl+R)">
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M14 8a6 6 0 1 1-1.5-4" />
                <path d="M14 2v4h-4" />
              </svg>
            </button>
          </div>

          <!-- アドレスバー -->
          <div class="address-bar-container">
            <div class="address-bar">
              <span class="security-icon" id="security-icon">
                <svg
                  width="14"
                  height="14"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                  <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                </svg>
              </span>
              <input
                type="text"
                class="address-input"
                id="address-input"
                placeholder="URLを入力または検索"
                spellcheck="false"
                autocomplete="off"
              />
            </div>
          </div>

          <!-- ツールバー右側のボタン -->
          <div class="toolbar-actions">
            <button class="toolbar-btn" id="split-view-btn" title="分割ビュー">
              <svg
                width="16"
                height="16"
                viewBox="0 0 16 16"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
              >
                <rect x="1" y="2" width="14" height="12" rx="1" />
                <line x1="8" y1="2" x2="8" y2="14" />
              </svg>
            </button>
            <button class="toolbar-btn" id="history-btn" title="履歴">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M3 12a9 9 0 1 0 3-6.7" />
                <polyline points="3 4 3 10 9 10" />
                <line x1="12" y1="7" x2="12" y2="12" />
                <line x1="12" y1="12" x2="16" y2="14" />
              </svg>
            </button>
            <button class="toolbar-btn" id="bookmark-btn" title="ブックマーク">
              <svg
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z" />
              </svg>
            </button>
          </div>
        </div>

        <!-- Webviewコンテナ -->
        <div class="webview-container" id="webview-container">
          <!-- webviewがここに動的に追加される -->
        </div>
      </main>
    </div>

    <!-- Panels -->
    <div class="panel-overlay" id="panel-overlay" aria-hidden="true">
      <section class="panel" id="bookmarks-panel" data-panel="bookmarks">
        <div class="panel-header">
          <h2>ブックマーク</h2>
          <div class="panel-actions">
            <button class="panel-btn" id="bookmark-current-btn">
              このページを追加
            </button>
            <button class="panel-close" data-panel-close>
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </div>
        <div class="panel-search">
          <input
            type="text"
            id="bookmarks-search"
            placeholder="ブックマークを検索"
            spellcheck="false"
          />
        </div>
        <div class="panel-list" id="bookmarks-list"></div>
        <div class="panel-empty" id="bookmarks-empty">
          ブックマークがありません
        </div>
      </section>

      <section class="panel" id="history-panel" data-panel="history">
        <div class="panel-header">
          <h2>履歴</h2>
          <div class="panel-actions">
            <button class="panel-btn ghost" id="history-clear-btn">
              履歴を削除
            </button>
            <button class="panel-close" data-panel-close>
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </div>
        <div class="panel-search">
          <input
            type="text"
            id="history-search"
            placeholder="履歴を検索"
            spellcheck="false"
          />
        </div>
        <div class="panel-list" id="history-list"></div>
        <div class="panel-empty" id="history-empty">履歴がありません</div>
      </section>

      <section
        class="panel panel--wide"
        id="settings-panel"
        data-panel="settings"
      >
        <div class="panel-header">
          <h2>設定</h2>
          <div class="panel-actions">
            <button class="panel-close" data-panel-close>
              <span aria-hidden="true">×</span>
            </button>
          </div>
        </div>
        <div class="panel-scroll">
          <div class="settings-section">
            <h3>一般</h3>
            <div class="settings-field">
              <label for="settings-search-engine">検索エンジン</label>
              <select id="settings-search-engine" class="settings-select">
                <option value="google">Google</option>
                <option value="duckduckgo">DuckDuckGo</option>
                <option value="bing">Bing</option>
                <option value="custom">カスタム</option>
              </select>
            </div>
            <div class="settings-field">
              <label for="settings-theme">テーマ</label>
              <select id="settings-theme" class="settings-select">
                <option value="liquid">リキッドグラス</option>
                <option value="classic">クラシック (ダーク)</option>
              </select>
            </div>
            <div
              class="settings-field"
              id="settings-variant-row"
              style="display: none"
            >
              <label for="settings-variant">テーマバリエーション</label>
              <select id="settings-variant" class="settings-select">
                <option value="nature">Nature (Green)</option>
                <option value="ocean">Ocean (Blue)</option>
                <option value="sunset">Sunset (Warm)</option>
                <option value="frost">Frost (Light)</option>
                <option value="midnight">Midnight (Dark Glass)</option>
              </select>
            </div>
            <div class="settings-field" id="settings-custom-row">
              <label for="settings-custom-search">カスタム検索URL</label>
              <input
                type="text"
                id="settings-custom-search"
                class="settings-input"
                placeholder="https://example.com/search?q={query}"
              />
              <p class="settings-note">
                <span>{query}</span> が検索キーワードに置き換わります
              </p>
            </div>
          </div>

          <div class="settings-section">
            <h3>同期</h3>
            <div class="settings-field">
              <div class="settings-actions">
                <button class="panel-btn" id="sync-export-btn">
                  エクスポート
                </button>
                <button class="panel-btn ghost" id="sync-import-btn">
                  インポート
                </button>
              </div>
              <p class="settings-note" id="sync-status">最終同期: -</p>
            </div>
          </div>

          <div class="settings-section">
            <h3>拡張機能</h3>
            <div class="settings-actions">
              <button class="panel-btn" id="extensions-add-btn">
                拡張機能を追加
              </button>
            </div>
            <div class="panel-list" id="extensions-list"></div>
            <div class="panel-empty" id="extensions-empty">
              拡張機能がありません
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- Space modal -->
    <div class="modal-overlay" id="space-modal" aria-hidden="true">
      <div class="modal">
        <div class="modal-header">
          <h2 id="space-modal-title">新しいスペース</h2>
        </div>
        <div class="modal-body">
          <label class="modal-field">
            名前
            <input type="text" id="space-name-input" placeholder="例: 学習" />
          </label>
          <label class="modal-field">
            アイコン
            <input
              type="text"
              id="space-icon-input"
              placeholder="例: ✨"
              maxlength="2"
            />
          </label>
        </div>
        <div class="modal-actions">
          <button class="panel-btn ghost" id="space-cancel-btn">
            キャンセル
          </button>
          <button class="panel-btn" id="space-create-btn">追加</button>
        </div>
      </div>
    </div>

    <script src="renderer.js"></script>
  </body>
</html>
